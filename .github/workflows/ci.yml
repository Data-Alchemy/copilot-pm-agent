name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Run post-compile
        run: npm run inject-wizard

      - name: Run tests
        run: npm test

      - name: Verify package.json integrity
        run: |
          node -e "
            const pkg = require('./package.json');
            const ext = require('fs').readFileSync('./out/extension.js', 'utf8');
            const errors = [];
            for (const [c, views] of Object.entries(pkg.contributes.views || {})) {
              for (const v of views) {
                if (v.type === 'webview' && !ext.includes(v.id)) {
                  errors.push('View ' + v.id + ' declared but not registered');
                }
              }
            }
            for (const cmd of (pkg.contributes.commands || [])) {
              if (!ext.includes(cmd.command)) {
                errors.push('Command ' + cmd.command + ' declared but not registered');
              }
            }
            if (errors.length) {
              console.error('Package integrity errors:');
              errors.forEach(e => console.error('  - ' + e));
              process.exit(1);
            }
            console.log('Package integrity: OK');
          "

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-agent-vsix
          path: "*.vsix"
          retention-days: 30
