name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Run post-compile
        run: npm run inject-wizard

      - name: Run tests
        run: npm test

      - name: Verify package.json integrity
        run: |
          node -e "
            const pkg = require('./package.json');
            const ext = require('fs').readFileSync('./out/extension.js', 'utf8');
            const errors = [];
            for (const [c, views] of Object.entries(pkg.contributes.views || {})) {
              for (const v of views) {
                if (v.type === 'webview' && !ext.includes(v.id)) {
                  errors.push('View ' + v.id + ' declared but not registered');
                }
              }
            }
            for (const cmd of (pkg.contributes.commands || [])) {
              if (!ext.includes(cmd.command)) {
                errors.push('Command ' + cmd.command + ' declared but not registered');
              }
            }
            if (errors.length) {
              console.error('Package integrity errors:');
              errors.forEach(e => console.error('  - ' + e));
              process.exit(1);
            }
            console.log('Package integrity: OK');
          "

  package-preview:
    name: Package Preview
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Post-compile
        run: npm run inject-wizard

      - name: Package preview VSIX
        run: npx @vscode/vsce package --no-dependencies --no-update-package-json

      - name: Delete previous preview artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = 'pm-agent-preview';
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
              name: artifactName,
            });
            for (const artifact of artifacts) {
              if (!artifact.expired) {
                console.log(`Deleting old artifact: ${artifact.name} (id: ${artifact.id})`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      - name: Upload preview VSIX
        uses: actions/upload-artifact@v4
        with:
          name: pm-agent-preview
          path: "*.vsix"
          retention-days: 14
