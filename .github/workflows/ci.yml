name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run post-compile
        run: npm run inject-wizard

      - name: Run tests
        run: npm test

      - name: Verify package.json integrity
        run: |
          node -e "
            const pkg = require('./package.json');
            const ext = require('fs').readFileSync('./out/extension.js', 'utf8');
            const errors = [];

            // All declared views have providers
            for (const [c, views] of Object.entries(pkg.contributes.views || {})) {
              for (const v of views) {
                if (v.type === 'webview' && !ext.includes(v.id)) {
                  errors.push('View ' + v.id + ' declared but not registered');
                }
              }
            }

            // All declared commands exist in extension.js
            for (const cmd of (pkg.contributes.commands || [])) {
              if (!ext.includes(cmd.command)) {
                errors.push('Command ' + cmd.command + ' declared but not registered');
              }
            }

            if (errors.length) {
              console.error('Package integrity errors:');
              errors.forEach(e => console.error('  - ' + e));
              process.exit(1);
            }
            console.log('Package integrity: OK');
          "

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pm-agent-vsix
          path: "*.vsix"
          retention-days: 30

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "## Features", "labels": ["feature", "enhancement"] },
                { "title": "## Bug Fixes", "labels": ["bug", "fix"] },
                { "title": "## Other", "labels": [] }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
