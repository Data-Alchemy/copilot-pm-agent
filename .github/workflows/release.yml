name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Set version from tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Tag: $TAG → Version: $VERSION"

          # package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "

          # package-lock.json
          if [ -f package-lock.json ]; then
            node -e "
              const fs = require('fs');
              const l = JSON.parse(fs.readFileSync('package-lock.json','utf8'));
              l.version = '$VERSION';
              if (l.packages && l.packages['']) l.packages[''].version = '$VERSION';
              fs.writeFileSync('package-lock.json', JSON.stringify(l,null,2)+'\n');
            "
          fi

          # CHANGELOG.md
          node -e "
            const fs = require('fs');
            const v='$VERSION', d=new Date().toISOString().split('T')[0];
            let c = fs.readFileSync('CHANGELOG.md','utf8');
            if (!c.includes('['+v+']')) {
              const e = '## ['+v+'] - '+d+'\n\nSee [release notes](https://github.com/Data-Alchemy/copilot-pm-agent/releases/tag/v'+v+').\n\n';
              const i = c.indexOf('## [');
              c = i>=0 ? c.slice(0,i)+e+c.slice(i) : c+'\n'+e;
              fs.writeFileSync('CHANGELOG.md', c);
            }
          "

          echo "package.json: $(node -p "require('./package.json').version")"

      - run: npx tsc -p ./
      - run: node scripts/inject-wizard.js
      - run: npx jest

      - name: Package VSIX
        run: |
          rm -f *.vsix
          npx @vscode/vsce package --no-dependencies --no-update-package-json
          echo "Built: $(ls *.vsix)"

      - name: Publish to Marketplace
        run: |
          VSIX=$(ls *.vsix)
          npx @vscode/vsce publish --packagePath "$VSIX" -p ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "release: v${{ env.VERSION }} [skip ci]"
          git push origin main
