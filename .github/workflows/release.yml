name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version from tag: $VERSION"

      - name: Bump package.json version
        run: |
          # Use node to directly write the version — guaranteed to work
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json version set to: ' + pkg.version);
          "

      - name: Verify version
        run: node -p "'Version in package.json: ' + require('./package.json').version"

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Run post-compile
        run: npm run inject-wizard

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish pre-built VSIX to Marketplace
        run: |
          # Publish the already-packaged VSIX directly — skips prepublish
          VSIX=$(ls *.vsix | head -1)
          echo "Publishing: $VSIX"
          npx @vscode/vsce publish --packagePath "$VSIX" -p ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main || true

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "## Features", "labels": ["feature", "enhancement"] },
                { "title": "## Bug Fixes", "labels": ["bug", "fix"] },
                { "title": "## Other", "labels": [] }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
