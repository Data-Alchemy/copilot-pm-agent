name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force version bump (leave empty for auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  check-release:
    name: Check if release needed
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, '[skip ci]'))
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      new_version: ${{ steps.check.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          FORCED_BUMP="${{ github.event.inputs.bump }}"
          if [ -n "$FORCED_BUMP" ]; then
            BUMP="$FORCED_BUMP"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              RANGE="HEAD"
            else
              RANGE="${LAST_TAG}..HEAD"
            fi

            COMMITS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null || echo "")
            if [ -z "$COMMITS" ]; then
              echo "No new commits"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Commits since ${LAST_TAG:-beginning}:"
            echo "$COMMITS"

            BUMP=""
            if echo "$COMMITS" | grep -qiE "^(feat|fix|refactor|perf|build|ci|docs|style|test|chore)(\(.+\))?!:"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qiE "^(fix|perf|refactor|build|ci|docs|style|test|chore)(\(.+\))?:"; then
              BUMP="patch"
            fi

            if [ -z "$BUMP" ]; then
              echo "No conventional commits — skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Bump type: $BUMP"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          echo "New version: $NEW_VERSION"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  release:
    name: Publish v${{ needs.check-release.outputs.new_version }}
    runs-on: ubuntu-latest
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set version everywhere
        run: |
          VERSION="${{ needs.check-release.outputs.new_version }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          # package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # package-lock.json (top-level version)
          if [ -f package-lock.json ]; then
            node -e "
              const fs = require('fs');
              const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
              lock.version = '$VERSION';
              if (lock.packages && lock.packages['']) { lock.packages[''].version = '$VERSION'; }
              fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');
            "
          fi

          # CHANGELOG.md
          node -e "
            const fs = require('fs');
            const v = '$VERSION';
            const d = new Date().toISOString().split('T')[0];
            let cl = fs.readFileSync('CHANGELOG.md', 'utf8');
            if (!cl.includes('[' + v + ']')) {
              const entry = '## [' + v + '] - ' + d + '\n\nSee [release notes](https://github.com/Data-Alchemy/copilot-pm-agent/releases/tag/v' + v + ').\n\n';
              const idx = cl.indexOf('## [');
              cl = idx >= 0 ? cl.slice(0, idx) + entry + cl.slice(idx) : cl + '\n' + entry;
              fs.writeFileSync('CHANGELOG.md', cl);
            }
          "

          echo "All files set to version: $VERSION"
          grep '"version"' package.json | head -1

      - name: Compile
        run: npx tsc -p ./

      - name: Post-compile
        run: node scripts/inject-wizard.js

      - name: Test
        run: npx jest

      - name: Remove old VSIX
        run: rm -f *.vsix

      - name: Package release VSIX
        run: npx @vscode/vsce package --no-dependencies --no-update-package-json

      - name: Verify
        run: |
          VSIX=$(ls *.vsix)
          echo "Built: $VSIX"
          echo "Version: ${{ env.VERSION }}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md *.vsix
          git commit -m "release: v${{ env.VERSION }} [skip ci]"
          git tag "v${{ env.VERSION }}"
          git push origin main --tags

      - name: Publish to VS Code Marketplace
        run: |
          VSIX=$(ls *.vsix)
          echo "Publishing $VSIX to Marketplace..."
          npx @vscode/vsce publish --packagePath "$VSIX" -p ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: "*.vsix"
          generate_release_notes: true
