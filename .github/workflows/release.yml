name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Extract version from tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Release tag: $TAG"
          echo "Package version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json version: $(node -p "require('./package.json').version")"

      - name: Compile TypeScript
        run: npx tsc -p ./

      - name: Run post-compile
        run: node scripts/inject-wizard.js

      - name: Run tests
        run: npx jest

      - name: Remove old VSIX files
        run: rm -f *.vsix

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies --no-update-package-json

      - name: Verify VSIX
        run: |
          VSIX=$(ls *.vsix)
          echo "Built: $VSIX"

      - name: Commit VSIX and version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json *.vsix
          git diff --cached --quiet || git commit -m "release: v${{ env.VERSION }} [skip ci]"
          git push origin main

      - name: Publish to VS Code Marketplace
        run: |
          VSIX=$(ls *.vsix)
          npx @vscode/vsce publish --packagePath "$VSIX" -p ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "## Features", "labels": ["feature", "enhancement"] },
                { "title": "## Bug Fixes", "labels": ["bug", "fix"] },
                { "title": "## Other", "labels": [] }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
