name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force version bump (leave empty for auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip bot commits
        id: guard
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          if echo "$MSG" | grep -q "\[skip ci\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump and build release notes
        if: steps.guard.outputs.skip != 'true'
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current: $CURRENT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null)
          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${LAST_TAG:-beginning}:"
          echo "$COMMITS"

          # Determine bump
          FORCED="${{ github.event.inputs.bump }}"
          if [ -n "$FORCED" ]; then
            BUMP="$FORCED"
          else
            BUMP=""
            echo "$COMMITS" | grep -qiE "^.+!:" && BUMP="major"
            [ -z "$BUMP" ] && echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:" && BUMP="minor"
            [ -z "$BUMP" ] && echo "$COMMITS" | grep -qiE "^(fix|perf|refactor|build|ci|docs|style|test|chore)(\(.+\))?:" && BUMP="patch"

            if [ -z "$BUMP" ]; then
              echo "No conventional commits"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Calculate new version
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          VERSION="${MAJ}.${MIN}.${PAT}"

          # Skip past any version that already exists as a git tag or on the Marketplace
          # v0.5.0 was previously published and cannot be reused
          while git tag -l "v$VERSION" | grep -q "v$VERSION" || [ "$VERSION" = "0.5.0" ]; do
            echo "v$VERSION already exists — bumping patch"
            IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
            PAT=$((PAT+1))
            VERSION="${MAJ}.${MIN}.${PAT}"
          done

          echo "$BUMP: $CURRENT -> $VERSION"

          # Build categorized release notes from commit messages
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            # Strip the prefix to get the human-readable message
            CLEANED=$(echo "$line" | sed 's/^[a-zA-Z]*([^)]*): //; s/^[a-zA-Z]*: //')
            if echo "$line" | grep -qiE "^feat(\(.+\))?:"; then
              FEATURES="${FEATURES}- ${CLEANED}\n"
            elif echo "$line" | grep -qiE "^fix(\(.+\))?:"; then
              FIXES="${FIXES}- ${CLEANED}\n"
            elif echo "$line" | grep -qiE "^(perf|refactor|build|ci|docs|style|test|chore)(\(.+\))?:"; then
              OTHER="${OTHER}- ${CLEANED}\n"
            else
              OTHER="${OTHER}- ${line}\n"
            fi
          done <<< "$COMMITS"

          NOTES=""
          [ -n "$FEATURES" ] && NOTES="${NOTES}### Features\n\n${FEATURES}\n"
          [ -n "$FIXES" ] && NOTES="${NOTES}### Bug Fixes\n\n${FIXES}\n"
          [ -n "$OTHER" ] && NOTES="${NOTES}### Other Changes\n\n${OTHER}\n"

          # Write to files for later steps
          printf "%b" "$NOTES" > /tmp/release_notes.md
          printf "%b" "$NOTES" > /tmp/changelog_entry.md

          echo "Release notes:"
          cat /tmp/release_notes.md

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.bump.outputs.should_release == 'true'
        with:
          node-version: 20

      - name: Install
        if: steps.bump.outputs.should_release == 'true'
        run: npm install

      - name: Set version and update changelog
        if: steps.bump.outputs.should_release == 'true'
        run: |
          V="${{ steps.bump.outputs.version }}"
          echo "VERSION=$V" >> "$GITHUB_ENV"

          # package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$V';
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "

          # package-lock.json
          if [ -f package-lock.json ]; then
            node -e "
              const fs = require('fs');
              const l = JSON.parse(fs.readFileSync('package-lock.json','utf8'));
              l.version = '$V';
              if (l.packages && l.packages['']) l.packages[''].version = '$V';
              fs.writeFileSync('package-lock.json', JSON.stringify(l,null,2)+'\n');
            "
          fi

          # CHANGELOG.md — insert real commit details
          node -e "
            const fs = require('fs');
            const v = '$V';
            const d = new Date().toISOString().split('T')[0];
            const details = fs.existsSync('/tmp/changelog_entry.md')
              ? fs.readFileSync('/tmp/changelog_entry.md', 'utf8').trim()
              : '';
            let cl = fs.readFileSync('CHANGELOG.md', 'utf8');
            if (!cl.includes('[' + v + ']')) {
              const header = '## [' + v + '] - ' + d + '\n\n';
              const entry = header + (details || 'Maintenance release.') + '\n\n';
              const idx = cl.indexOf('## [');
              cl = idx >= 0 ? cl.slice(0, idx) + entry + cl.slice(idx) : cl + '\n' + entry;
              fs.writeFileSync('CHANGELOG.md', cl);
              console.log('CHANGELOG: added ' + v + ' with ' + details.split('\\n').filter(l => l.startsWith('-')).length + ' entries');
            }
          "

          echo "Version: $(node -p "require('./package.json').version")"

      - name: Compile
        if: steps.bump.outputs.should_release == 'true'
        run: npx tsc -p ./

      - name: Post-compile
        if: steps.bump.outputs.should_release == 'true'
        run: node scripts/inject-wizard.js

      - name: Test
        if: steps.bump.outputs.should_release == 'true'
        run: npx jest

      - name: Package
        if: steps.bump.outputs.should_release == 'true'
        run: |
          rm -f *.vsix
          V=$(node -p "require('./package.json').version")
          echo "Packaging version: $V"
          if [ "$V" = "0.5.0" ] || [ -z "$V" ]; then
            echo "ERROR: Version was not bumped! Got: $V"
            exit 1
          fi
          # Remove prepublish so vsce doesn't re-compile from scratch
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            delete pkg.scripts['vscode:prepublish'];
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "
          npx @vscode/vsce package --no-dependencies
          # Restore prepublish for the commit
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.scripts['vscode:prepublish'] = 'npm run compile && npm run inject-wizard';
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "
          echo "Built: $(ls *.vsix)"

      - name: Publish to Marketplace
        if: steps.bump.outputs.should_release == 'true'
        run: |
          VSIX=$(ls *.vsix)
          npx @vscode/vsce publish --packagePath "$VSIX" -p ${{ secrets.VSCE_PAT }}

      - name: Commit version bump
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "release: v${{ env.VERSION }} [skip ci]"
          git tag "v${{ env.VERSION }}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: /tmp/release_notes.md
