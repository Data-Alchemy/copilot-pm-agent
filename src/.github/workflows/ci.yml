name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run compile
      - run: npm run inject-wizard
      - run: npm test
      - name: Verify package.json integrity
        run: |
          node -e "
            const pkg = require('./package.json');
            const ext = require('fs').readFileSync('./out/extension.js', 'utf8');
            const errors = [];
            for (const [c, views] of Object.entries(pkg.contributes.views || {})) {
              for (const v of views) {
                if (v.type === 'webview' && !ext.includes(v.id))
                  errors.push('View ' + v.id + ' not registered');
              }
            }
            for (const cmd of (pkg.contributes.commands || [])) {
              if (!ext.includes(cmd.command))
                errors.push('Command ' + cmd.command + ' not registered');
            }
            if (errors.length) { errors.forEach(e => console.error(e)); process.exit(1); }
            console.log('Package integrity: OK');
          "

  preview:
    name: Preview VSIX
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run compile
      - run: npm run inject-wizard
      - run: npx @vscode/vsce package --no-dependencies --no-update-package-json

      - name: Delete old preview artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              per_page: 100, name: 'pm-agent-preview',
            });
            for (const a of artifacts) {
              if (!a.expired) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner, repo: context.repo.repo, artifact_id: a.id,
                });
              }
            }

      - uses: actions/upload-artifact@v4
        with:
          name: pm-agent-preview
          path: "*.vsix"
          retention-days: 14
