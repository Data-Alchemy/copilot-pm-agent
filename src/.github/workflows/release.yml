name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force version bump (leave empty for auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip bot commits
        id: guard
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          if echo "$MSG" | grep -q "\[skip ci\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version bump and build release notes
        if: steps.guard.outputs.skip != 'true'
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current: $CURRENT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null)
          export COMMITS
          if [ -z "$COMMITS" ]; then
            echo "No commits since last tag"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${LAST_TAG:-beginning}:"
          echo "$COMMITS"

          # Determine bump
          FORCED="${{ github.event.inputs.bump }}"
          if [ -n "$FORCED" ]; then
            BUMP="$FORCED"
          else
            BUMP=""
            echo "$COMMITS" | grep -qiE "^.+!:" && BUMP="major"
            [ -z "$BUMP" ] && echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:" && BUMP="minor"
            [ -z "$BUMP" ] && echo "$COMMITS" | grep -qiE "^(fix|perf|refactor|build|ci|docs|style|test|chore)(\(.+\))?:" && BUMP="patch"

            if [ -z "$BUMP" ]; then
              echo "No conventional commits"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Calculate new version
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          case "$BUMP" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          VERSION="${MAJ}.${MIN}.${PAT}"

          # Skip past any version that already exists as a git tag or on the Marketplace
          # v0.5.0 was previously published and cannot be reused
          while git tag -l "v$VERSION" | grep -q "v$VERSION" || [ "$VERSION" = "0.5.0" ]; do
            echo "v$VERSION already exists — bumping patch"
            IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
            PAT=$((PAT+1))
            VERSION="${MAJ}.${MIN}.${PAT}"
          done

          echo "$BUMP: $CURRENT -> $VERSION"
          export VERSION

          # Build release notes and changelog entry using node for better parsing
          node -e "
            const commits = process.env.COMMITS.split('\n').filter(Boolean);
            const version = process.env.VERSION;

            const categories = {
              breaking: { title: 'Breaking Changes', items: [] },
              feat:     { title: 'Features', items: [] },
              fix:      { title: 'Bug Fixes', items: [] },
              perf:     { title: 'Performance', items: [] },
              refactor: { title: 'Refactoring', items: [] },
              docs:     { title: 'Documentation', items: [] },
              ci:       { title: 'CI/CD', items: [] },
              other:    { title: 'Other Changes', items: [] },
            };

            const seen = new Set();
            for (const raw of commits) {
              // Skip duplicates and release commits
              const key = raw.toLowerCase().trim();
              if (seen.has(key) || key.startsWith('release:') || key.includes('[skip ci]')) continue;
              seen.add(key);

              // Parse: type(scope)!: message
              const m = raw.match(/^(\w+)(?:\(([^)]+)\))?(!)?\s*:\s*(.+)/);
              if (!m) {
                categories.other.items.push({ scope: '', msg: raw });
                continue;
              }
              const [, type, scope, bang, msg] = m;

              // Breaking change
              if (bang) {
                categories.breaking.items.push({ scope: scope || '', msg });
              }

              const t = type.toLowerCase();
              if (t === 'feat')          categories.feat.items.push({ scope: scope || '', msg });
              else if (t === 'fix')      categories.fix.items.push({ scope: scope || '', msg });
              else if (t === 'perf')     categories.perf.items.push({ scope: scope || '', msg });
              else if (t === 'refactor') categories.refactor.items.push({ scope: scope || '', msg });
              else if (t === 'docs')     categories.docs.items.push({ scope: scope || '', msg });
              else if (t === 'ci' || t === 'build') categories.ci.items.push({ scope: scope || '', msg });
              else if (t === 'chore' || t === 'style' || t === 'test')
                categories.other.items.push({ scope: scope || '', msg });
            }

            // Format
            let notes = '';
            let changelog = '';
            for (const cat of Object.values(categories)) {
              if (!cat.items.length) continue;
              const section = '### ' + cat.title + '\n\n' +
                cat.items.map(i => '- ' + (i.scope ? '**' + i.scope + ':** ' : '') + i.msg).join('\n') +
                '\n\n';
              notes += section;
              changelog += section;
            }

            if (!notes.trim()) {
              notes = 'Maintenance release.\n';
              changelog = 'Maintenance release.\n';
            }

            require('fs').writeFileSync('/tmp/release_notes.md', notes);
            require('fs').writeFileSync('/tmp/changelog_entry.md', changelog);
            console.log(notes);
          " 2>&1 || echo "Note generation failed — using fallback"

          # Fallback if node script fails
          if [ ! -f /tmp/release_notes.md ]; then
            echo "### Changes" > /tmp/release_notes.md
            echo "$COMMITS" | while IFS= read -r line; do echo "- $line" >> /tmp/release_notes.md; done
            cp /tmp/release_notes.md /tmp/changelog_entry.md
          fi

          echo "Release notes:"
          cat /tmp/release_notes.md

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.bump.outputs.should_release == 'true'
        with:
          node-version: 20

      - name: Install
        if: steps.bump.outputs.should_release == 'true'
        run: npm install

      - name: Set version and update changelog
        if: steps.bump.outputs.should_release == 'true'
        run: |
          V="${{ steps.bump.outputs.version }}"
          echo "VERSION=$V" >> "$GITHUB_ENV"

          # package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$V';
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "

          # package-lock.json
          if [ -f package-lock.json ]; then
            node -e "
              const fs = require('fs');
              const l = JSON.parse(fs.readFileSync('package-lock.json','utf8'));
              l.version = '$V';
              if (l.packages && l.packages['']) l.packages[''].version = '$V';
              fs.writeFileSync('package-lock.json', JSON.stringify(l,null,2)+'\n');
            "
          fi

          # CHANGELOG.md — insert real commit details
          node -e "
            const fs = require('fs');
            const v = '$V';
            const d = new Date().toISOString().split('T')[0];
            const details = fs.existsSync('/tmp/changelog_entry.md')
              ? fs.readFileSync('/tmp/changelog_entry.md', 'utf8').trim()
              : '';
            let cl = fs.readFileSync('CHANGELOG.md', 'utf8');
            if (!cl.includes('[' + v + ']')) {
              const header = '## [' + v + '] - ' + d + '\n\n';
              const entry = header + (details || 'Maintenance release.') + '\n\n';
              const idx = cl.indexOf('## [');
              cl = idx >= 0 ? cl.slice(0, idx) + entry + cl.slice(idx) : cl + '\n' + entry;
              fs.writeFileSync('CHANGELOG.md', cl);
              console.log('CHANGELOG: added ' + v + ' with ' + details.split('\\n').filter(l => l.startsWith('-')).length + ' entries');
            }
          "

          echo "Version: $(node -p "require('./package.json').version")"

      - name: Compile
        if: steps.bump.outputs.should_release == 'true'
        run: npx tsc -p ./

      - name: Post-compile
        if: steps.bump.outputs.should_release == 'true'
        run: node scripts/inject-wizard.js

      - name: Test
        if: steps.bump.outputs.should_release == 'true'
        run: npx jest

      - name: Package
        if: steps.bump.outputs.should_release == 'true'
        run: |
          rm -f *.vsix
          V=$(node -p "require('./package.json').version")
          echo "Packaging version: $V"
          if [ "$V" = "0.5.0" ] || [ -z "$V" ]; then
            echo "ERROR: Version was not bumped! Got: $V"
            exit 1
          fi
          # Remove prepublish so vsce doesn't re-compile from scratch
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            delete pkg.scripts['vscode:prepublish'];
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "
          npx @vscode/vsce package --no-dependencies
          # Restore prepublish for the commit
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.scripts['vscode:prepublish'] = 'npm run compile && npm run inject-wizard';
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "
          echo "Built: $(ls *.vsix)"

      - name: Publish to Marketplace
        if: steps.bump.outputs.should_release == 'true'
        run: |
          VSIX=$(ls *.vsix)
          npx @vscode/vsce publish --packagePath "$VSIX" -p ${{ secrets.VSCE_PAT }}

      - name: Commit version bump
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "release: v${{ env.VERSION }} [skip ci]"
          git tag "v${{ env.VERSION }}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: /tmp/release_notes.md
